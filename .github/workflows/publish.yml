name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Debug OIDC token availability
        run: |
          echo "Checking if OIDC token URL is available..."
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token URL is set"
          else
            echo "WARNING: OIDC token URL is NOT set"
          fi
      
      - run: npm ci
      
      - run: npm run build
      
      - name: Publish @kagami-cli/plugin only (test)
        run: cd packages/plugin && npm publish
