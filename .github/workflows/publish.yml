name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - run: npm ci
      
      - run: npm run build
      
      - name: Publish @kagami-cli/plugin
        working-directory: packages/plugin
        run: npm publish
      
      - name: Publish @kagami-cli/plugin-mangadex
        working-directory: packages/plugin-mangadex
        run: npm publish
      
      - name: Publish @kagami-cli/plugin-mangalib
        working-directory: packages/plugin-mangalib
        run: npm publish
      
      - name: Publish kagami-cli
        working-directory: packages/cli
        run: npm publish
