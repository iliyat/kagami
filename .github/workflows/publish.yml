name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Update npm
        run: npm install -g npm@latest
      
      - run: npm ci
      
      - run: npm run build
      
      - name: Publish @kagami-cli/plugin
        run: npm publish -w packages/plugin
      
      - name: Publish @kagami-cli/plugin-mangadex
        run: npm publish -w packages/plugin-mangadex
      
      - name: Publish @kagami-cli/plugin-mangalib
        run: npm publish -w packages/plugin-mangalib
      
      - name: Publish kagami-cli
        run: npm publish -w packages/cli
