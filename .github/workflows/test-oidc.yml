name: Test OIDC

on:
  workflow_dispatch:  # Manual trigger for testing

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Check npm version
        run: npm --version
      
      - name: Check OIDC token
        run: |
          echo "Token URL exists: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL != '' }}"
          curl -s "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://registry.npmjs.org" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            | node -e "const d=[]; process.stdin.on('data',c=>d.push(c)); process.stdin.on('end',()=>{const j=JSON.parse(Buffer.concat(d).toString()); console.log('Token received:', !!j.value)})"
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
      
      - name: Try publishing with provenance
        run: cd packages/plugin && npm publish --provenance
